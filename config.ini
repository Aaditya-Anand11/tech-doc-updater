[Application]
name = Enhanced Document Updater
version = 3.0.0
# Allowed environments: development, staging, production
environment = development
debug_mode = false

[Server]
# API server configuration
host = 127.0.0.1
port = 7870
workers = 4
# Allowed CORS origins
cors_origins = http://localhost:7870,http://127.0.0.1:8000
# Max upload size in megabytes
max_upload_mb = 500

[Database]
# SQLite database path for RBAC
path = ./data/docsync.db
# In hours
session_ttl = 8

[Logging]
# DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
log_file = ./data/logs/docsync.log
# Whether to log to console
console = true
# Rotating log settings
max_bytes = 10485760
backup_count = 5

[Storage]
# Directory paths
data_dir = ./data
output_dir = ./data/output
history_dir = ./data/history
documents_dir = ./data/documents
gui_screenshots_dir = ./data/gui_screenshots

[Analysis]
# Default similarity threshold (0.0 to 1.0)
# Used by AdvancedImageMatcher to decide if two images match
similarity_threshold = 0.30
# Minimum region area to report
min_region_area = 10
# Text similarity strictness
text_similarity_threshold = 0.90
# Enable perceptual hashing
use_phash = true
# Compute detailed edge similarity
compute_edges = true

[OCR]
# Ensure pytesseract is configured
enable_ocr = true
# Engine mode (3 = Default)
oem = 3
# Page segmentation mode (6 = Uniform block of text)
psm = 6
# Language
language = eng
# Whether to aggressively correct single chars (false recommended)
aggressive_correction = false

[AI_Validation]
# Set environment variable GEMINI_API_KEY for the actual key
api_key_env_var = GEMINI_API_KEY
# Default model to use
model = gemini-2.0-flash
# Validation strictness
strictness = high

[Reporting]
# Formats to generate by default
generate_html = true
generate_json = true
generate_pdf = true
# Report title
title = Technical Document Update Analysis
# Company name for branding
company_name = Schneider Electric

[Security]
# Minimum password length
min_password_length = 4
# Allowed file extensions
allowed_extensions = .png,.jpg,.jpeg,.pdf
# Max password attempts
max_login_attempts = 5

[Advanced]
# Number of background threads to use for parallel processing
max_threads = 4
# Timeout for long-running processes (seconds)
process_timeout = 300
# Use GPU acceleration if available (CUDA/ROCm)
use_gpu = false

[Optimization]
# Automatically resize very large images
auto_resize_large_images = true
# Max dimension before resize
max_dimension = 3000
# Cache exact image matches
enable_caching = true
